<script>
const scriptURL = "https://script.google.com/macros/s/AKfycby8l-BfRmCXKvuhljRSSnehKsl82xooKW2sCazad-9XyPETBKRd0zlhR7dy1dFJDwRUcg/exec";

const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    fetch(scriptURL, {
        method: "POST",
        body: new FormData(form)
    })
    .then(response => response.text())
    .then(data => {
        alert("Thank you! Your inquiry has been submitted.");
        form.reset();
    })
    .catch(error => {
        alert("Error submitting the form.");
    });
});
</script>

</form>
